name: Deploy to blog (CT 308)

on:
  push:
    branches:
      - release

concurrency:
  group: deploy-blog
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build Astro
        run: pnpm build

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Deploy via rsync over Cloudflare Tunnel
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.ssh

          echo "$SSH_PRIVATE_KEY" > ~/.ssh/blog_deploy
          chmod 600 ~/.ssh/blog_deploy

          cat > /tmp/cf-proxy.sh << SCRIPT
          #!/bin/bash
          export CF_ACCESS_CLIENT_ID="${CF_ACCESS_CLIENT_ID}"
          export CF_ACCESS_CLIENT_SECRET="${CF_ACCESS_CLIENT_SECRET}"
          cloudflared access ssh --hostname \$1
          SCRIPT
          chmod +x /tmp/cf-proxy.sh

          cat > ~/.ssh/config << EOF
          Host blog-ssh.t12jp.org
            ProxyCommand /tmp/cf-proxy.sh %h
            IdentityFile ~/.ssh/blog_deploy
            StrictHostKeyChecking no
            User root
          EOF
          chmod 600 ~/.ssh/config

          rsync -avz --delete \
            dist/ \
            root@blog-ssh.t12jp.org:/var/www/blog/
