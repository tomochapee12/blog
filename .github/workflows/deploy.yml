name: Deploy to blog (CT 308)

on:
  push:
    branches:
      - release

concurrency:
  group: deploy-blog
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build Astro
        run: pnpm build

      - name: Install cloudflared
        run: |
          sudo curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Deploy via rsync over Cloudflare Tunnel
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh

          # base64デコードして秘密鍵を復元
          echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/blog_deploy
          chmod 600 ~/.ssh/blog_deploy

          cat > ~/.ssh/config << EOF
          Host blog-deploy.t12jp.org
            IdentityFile ~/.ssh/blog_deploy
            StrictHostKeyChecking no
            User root
            ProxyCommand cloudflared access ssh --hostname %h
          EOF
          chmod 600 ~/.ssh/config

          rsync -avz --delete \
            dist/ \
            root@blog-deploy.t12jp.org:/var/www/blog/
