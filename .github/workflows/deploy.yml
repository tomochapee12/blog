name: Deploy to blog (CT 308)

on:
  push:
    branches:
      - release

concurrency:
  group: deploy-blog
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build Astro
        run: pnpm build

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Deploy via rsync over Cloudflare Tunnel
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # 秘密鍵を配置
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/blog_deploy
          chmod 600 ~/.ssh/blog_deploy

          # SSH設定（cloudflaredをProxyCommandに）
          cat >> ~/.ssh/config << EOF
          Host blog-ssh.${{ secrets.CF_DOMAIN }}
            ProxyCommand cloudflared access ssh --hostname %h
            IdentityFile ~/.ssh/blog_deploy
            StrictHostKeyChecking no
            User root
          EOF

          # rsync実行
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/blog_deploy -o ProxyCommand='cloudflared access ssh --hostname blog-ssh.${{ secrets.CF_DOMAIN }}' -o StrictHostKeyChecking=no" \
            dist/ \
            root@blog-ssh.${{ secrets.CF_DOMAIN }}:/var/www/blog/
